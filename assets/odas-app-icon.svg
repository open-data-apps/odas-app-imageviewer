<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Hintergrund-Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7eb8f7"/>
      <stop offset="100%" stop-color="#3d3fa5"/>
    </linearGradient>
    <!-- Schatten-Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Hintergrund -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>

  <!-- Optional: Glanz-Overlay oben-links -->
  <ellipse cx="160" cy="140" rx="180" ry="160" fill="white" fill-opacity="0.07"/>

  <!-- Motiv: Imageviewer -->
  <g filter="url(#shadow)">
    <!-- Bilderrahmen -->
    <rect x="110" y="130" width="292" height="252" rx="16" fill="none" stroke="#ffffff" stroke-width="24"/>
    <!-- Berge / Bildinhalt -->
    <path d="M 110 330 L 190 230 L 250 290 L 310 200 L 402 310" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Sonne / Mond -->
    <circle cx="320" cy="190" r="24" fill="#ffffff"/>
  </g>
</svg>